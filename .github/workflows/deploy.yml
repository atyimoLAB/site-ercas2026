name: Build and deploy Jekyll site (FTP over VPN)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Read-only repo permissions: the workflow only needs to read repository contents.
permissions:
  contents: read

# One deploy at a time; never cancel an in-flight mirror.
concurrency:
  group: ftp-deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Ruby
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        env:
          BUNDLE_FROZEN: 'true'          # fail if Gemfile.lock is stale
        with:
          ruby-version: '3.4'
          bundler-cache: true            # gems cached by Gemfile.lock hash

      - name: Build site (pt)
        run: bundle exec jekyll build --config _config.yml,_config.pt.yml -d _site
        env:
          JEKYLL_ENV: production

      - name: Install tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          # openfortivpn hands off to pppd to create ppp0; without ppp it dies after "Authenticated."
          sudo apt-get install -y openfortivpn ppp
          command -v pppd >/dev/null 2>&1 || [ -x /usr/sbin/pppd ] \
            || { echo "pppd missing -- openfortivpn cannot bring up ppp0"; exit 1; }
          # pppd needs the kernel ppp module + /dev/ppp, both absent on ubuntu-latest by default.
          sudo modprobe ppp_generic
          [ -e /dev/ppp ] || { echo "/dev/ppp missing -- pppd cannot bring up ppp0"; exit 1; }

      - name: Connect to SSL-VPN
        env:
          VPN_GATEWAY_HOST: ${{ secrets.VPN_GATEWAY_HOST }}
          VPN_GATEWAY_PORT: ${{ secrets.VPN_GATEWAY_PORT }}
          VPN_USERNAME: ${{ secrets.VPN_USERNAME }}
          VPN_PASSWORD: ${{ secrets.VPN_PASSWORD }}
        run: |
          set -euo pipefail

          # Config mode 600; secrets never on the CLI.
          umask 077
          printf 'host = %s\n'          "$VPN_GATEWAY_HOST"  >  vpn.conf
          printf 'port = %s\n'          "$VPN_GATEWAY_PORT"  >> vpn.conf
          printf 'username = %s\n'      "$VPN_USERNAME"      >> vpn.conf
          printf 'password = %s\n'      "$VPN_PASSWORD"      >> vpn.conf

          # Pre-create as runner so root's append-writes stay readable.
          : > openfortivpn.log
          : > openfortivpn.pid

          # Capture openfortivpn's REAL pid inside the root shell (not sudo's) for clean teardown.
          sudo sh -c 'openfortivpn -c vpn.conf >> openfortivpn.log 2>&1 & echo $! > openfortivpn.pid'

          # Wait for ppp0; bail fast if the process dies mid-bring-up.
          echo "Waiting for ppp0 interface..."
          for i in $(seq 1 30); do
            if ip link show ppp0 >/dev/null 2>&1; then
              echo "VPN tunnel is up (ppp0 present)."
              rm -f vpn.conf
              ip -brief addr show ppp0 || true
              exit 0
            fi
            if ! sudo kill -0 "$(cat openfortivpn.pid 2>/dev/null)" 2>/dev/null; then
              echo "ERROR: openfortivpn exited before ppp0 came up. VPN log:"
              cat openfortivpn.log || true
              rm -f vpn.conf
              exit 1
            fi
            sleep 2
          done

          echo "ERROR: ppp0 did not come up within timeout. VPN log:"
          cat openfortivpn.log || true
          rm -f vpn.conf
          exit 1

      - name: Assert FTP route goes through the VPN (fail closed)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          set -euo pipefail
          # Assert the kernel route to the FTP host egresses ppp0 (ping is not proof).
          # Resolve IPv4 explicitly: the openfortivpn tunnel is IPv4 (ppp0). getent hosts can
          # return an AAAA first, and `ip route get` on a v6 addr won't match ppp0 -> false negative.
          # ahostsv4 forces A records only; fail closed if nothing resolves.
          IP=$(getent ahostsv4 "$FTP_SERVER" | awk '{print $1; exit}')
          [ -n "$IP" ] || { echo "Could not resolve an IPv4 address for $FTP_SERVER. Refusing to deploy."; exit 1; }
          DEV=$(ip route get "$IP" | grep -oP 'dev \K\S+' || true)
          echo "Route to FTP host ($IP) uses dev: ${DEV:-<none>}"
          [ "$DEV" = "ppp0" ] || { echo "FTP route is NOT via VPN (dev=$DEV). Refusing to deploy."; exit 1; }

      - name: Deploy to FTP (mirror with delete)
        uses: SamKirkland/FTP-Deploy-Action@110f9186c050f71550953127052e77650219c287 # v4.4.0
        with:
          protocol: ftp                 # egress protected by the VPN, not TLS
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./_site/           # trailing slash required; Jekyll output dir
          server-dir: /sharedirs/sharedir01/tchaves/public_html/

      - name: Disconnect SSL-VPN
        if: always()                  # run even on failure; never leave the tunnel up
        run: |
          if [ -f openfortivpn.pid ]; then
            VPN_PID="$(cat openfortivpn.pid)"
            if [ -n "${VPN_PID}" ]; then
              echo "Stopping openfortivpn (PID ${VPN_PID})..."
              sudo kill "${VPN_PID}" 2>/dev/null || true
            fi
          fi
          sudo pkill -x openfortivpn 2>/dev/null || true   # exact process-name match; -f would substring-match unrelated cmdlines
          rm -f vpn.conf openfortivpn.pid openfortivpn.log  # remove log so VPN diagnostics can't leak into later steps/artifacts
          echo "VPN teardown complete."
