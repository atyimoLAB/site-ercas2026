# Build Next.js static export and mirror it over FTP to the internal host.
# FTP server is reachable only inside the network, so connect via FortiGate
# SSL-VPN (openfortivpn) first. Plain FTP is used because the server requires it;
# it's mitigated by the SSL-VPN tunnel. All actions pinned to commit SHAs.

name: Deploy (Next.js static export -> FTP)

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

# Read-only token: this workflow only builds the repo.
permissions:
  contents: read

# Serialize deploys; never cancel an in-flight mirror.
concurrency:
  group: deploy-ftp-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Single job: the FTP step consumes the freshly built `out/`.
  build-and-deploy:
    name: Build and deploy to FTP
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # --- Build ---
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false # deploy is via FTP, not git

      - name: Setup Node.js 22
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build # emits out/

      # --- VPN ---
      - name: Install openfortivpn
        run: |
          sudo apt-get update
          sudo apt-get install -y openfortivpn

      # Secrets go in via env -> config file, never on the command line.
      # Gateway cert validated against the system CA bundle. To pin the cert
      # (defends against CA compromise / MITM), add a VPN_TRUSTED_CERT secret
      # with the SHA-256 fingerprint and re-add the trusted-cert config line.
      - name: Connect to SSL-VPN
        env:
          VPN_GATEWAY_HOST: ${{ secrets.VPN_GATEWAY_HOST }}
          VPN_GATEWAY_PORT: ${{ secrets.VPN_GATEWAY_PORT }}
          VPN_USERNAME: ${{ secrets.VPN_USERNAME }}
          VPN_PASSWORD: ${{ secrets.VPN_PASSWORD }}
        run: |
          set -euo pipefail

          # Write config mode 600 (umask 077), keeping secrets off the CLI.
          umask 077
          printf 'host = %s\n'          "$VPN_GATEWAY_HOST"  >  vpn.conf
          printf 'port = %s\n'          "$VPN_GATEWAY_PORT"  >> vpn.conf
          printf 'username = %s\n'      "$VPN_USERNAME"      >> vpn.conf
          printf 'password = %s\n'      "$VPN_PASSWORD"      >> vpn.conf

          # Pre-create log/pid as the runner so the root-owned writes below
          # stay readable (root `> file` truncates in place, keeps ownership).
          : > openfortivpn.log
          : > openfortivpn.pid

          # Start tunnel as root, capturing openfortivpn's REAL pid. A
          # backgrounded `sudo ...` would give sudo's pid via $!, so teardown
          # could kill sudo and leave openfortivpn running. Grab $! inside the
          # root shell instead, where it refers to openfortivpn itself.
          sudo sh -c 'openfortivpn -c vpn.conf >> openfortivpn.log 2>&1 & echo $! > openfortivpn.pid'

          # Wait for ppp0 (tunnel up), then remove the config.
          echo "Waiting for ppp0 interface..."
          for i in $(seq 1 30); do
            if ip link show ppp0 >/dev/null 2>&1; then
              echo "VPN tunnel is up (ppp0 present)."
              rm -f vpn.conf
              ip -brief addr show ppp0 || true
              exit 0
            fi
            sleep 2
          done

          echo "ERROR: ppp0 did not come up within timeout. VPN log:"
          cat openfortivpn.log || true
          rm -f vpn.conf
          exit 1

      # --- Deploy ---
      # lftp over basic-ftp: active mode works over the VPN where PASV doesn't.
      # `mirror -R --delete` wipes stale files + uploads in one pass.
      - name: Deploy to FTP (lftp mirror with delete)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail
          sudo apt-get install -y lftp

          # Secrets to a 600 file, off the command line / process list.
          umask 077
          # Passive mode, but ignore the server's PASV-advertised IP (it returns
          # an internal/NAT address unreachable over the VPN) and reconnect to
          # the control IP instead. Active mode fails: server can't dial ppp0.
          cat > deploy.lftp <<EOF
          set ftp:ssl-allow false
          set ftp:passive-mode true
          set ftp:fix-pasv-address true
          set net:timeout 20
          set net:max-retries 2
          set net:reconnect-interval-base 5
          set cmd:fail-exit true
          open -u "$FTP_USERNAME","$FTP_PASSWORD" "ftp://$FTP_SERVER"
          # debug 3  # protocol trace for diagnosing handshake; off to keep auth out of logs
          mirror -R --delete --verbose out/ /sharedirs/sharedir01/tchaves/public_html/
          bye
          EOF

          lftp -f deploy.lftp
          rm -f deploy.lftp

      # --- Teardown --- always stop the tunnel, even on failure.
      - name: Disconnect SSL-VPN
        if: always()
        run: |
          if [ -f openfortivpn.pid ]; then
            VPN_PID="$(cat openfortivpn.pid)"
            if [ -n "${VPN_PID}" ]; then
              echo "Stopping openfortivpn (PID ${VPN_PID})..."
              sudo kill "${VPN_PID}" 2>/dev/null || true
            fi
          fi
          sudo pkill -f openfortivpn 2>/dev/null || true
          rm -f vpn.conf openfortivpn.pid deploy.lftp
          echo "VPN teardown complete."
